name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write # npm trusted publishing (OIDC) to npmjs.org

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Pin 24.18.0+: Node 24.17.0 carries an http.Agent regression that makes node-fetch@2 (auto's pinned
          # octokit) throw false ERR_STREAM_PREMATURE_CLOSE on keep-alive socket reuse — nodejs/node#63989, fixed in 24.18.0.
          node-version: 24.18.0
          cache: 'pnpm'

      # allow the lock file to change (updating our own workspace versions in monorepo)
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test
      - run: pnpm build

      # commit back the lock file change if it works
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply pnpm-lock.yaml changes

      - run: pnpm release

      # OIDC trusted publishing requires npm >= 11.5.1; setup-node's bundled npm may lag behind
      - run: npm install --global npm@latest

      # cannot run this on branches because it doesn't keep the canary version from auto shipit, can only secondarily publish to npm for main branch
      - name: Publish secondarily to npm
        # Auth for npmjs.org is OIDC trusted publishing (id-token above), not NPM_TOKEN; npm auto-generates provenance.
        # waiting on bug/related pr/auto release https://github.com/intuit/auto/issues/2488
        # run: lerna exec --stream --parallel -- npm publish --access=public --ignore-scripts --@alienfast:registry='https://registry.npmjs.org'
        run: >
          cd packages/logger && npm publish --access=public --ignore-scripts --@alienfast:registry='https://registry.npmjs.org'
          && cd ../logger-browser && npm publish --access=public --ignore-scripts --@alienfast:registry='https://registry.npmjs.org'
          && cd ../logger-node && npm publish --access=public --ignore-scripts --@alienfast:registry='https://registry.npmjs.org'
        if: github.ref == 'refs/heads/main'
